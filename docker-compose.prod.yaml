version: '3.8'

services:
  server:
    image: yadavkapil9560/lumora-server:latest
    container_name: backend
    expose:
      - "5000"
    env_file: .env
    restart: always

  client:
    image: yadavkapil9560/lumora-client:latest
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - server
    restart: always
